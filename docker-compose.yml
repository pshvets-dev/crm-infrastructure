version: "3.8"

services:
    # 1. PostgreSQL
    postgres:
        image: postgres:15
        container_name: crm-postgres
        environment:
            POSTGRES_DB: crm_development
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U user -d crm_development"]
            interval: 5s
            timeout: 5s
            retries: 5

    # 2. Cache layer Redis
    redis:
        image: redis:7-alpine
        container_name: crm-redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

    # 3. Redis UI
    redis-insight:
        image: redis/redisinsight:latest
        container_name: crm-redisinsight
        ports:
            - "5540:5540"
        depends_on:
            - redis

    # 4. Kafka broker
    kafka:
        image: apache/kafka:latest
        container_name: crm-kafka
        ports:
            - "9092:9092"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:9094
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_LOG_DIRS: /var/lib/kafka/data
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_CLUSTER_ID: "4L62YD3vT9Ssp9Q7vKVgIQ"

    # 5. Kafka UI
    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: crm-kafka-ui
        ports:
            - "8080:8080"
        environment:
            DYNAMIC_CONFIG_ENABLED: "true"
            KAFKA_CLUSTERS_0_NAME: local-cluster
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
        depends_on:
            - kafka

volumes:
    postgres_data:
    redis_data:
